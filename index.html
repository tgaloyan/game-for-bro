<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Տարոնի Խաղը 😎</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#gameContainer{
    position:relative;
}

canvas{
    background:#1c1c1c;
    border:3px solid white;
    display:block;
}

#gameOver{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.9);
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

#gameOver h1{
    color:#ff5555;
    margin-bottom:10px;
}

#message{
    font-size:22px;
    margin-bottom:15px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="gameContainer">

    <canvas id="game"></canvas>

    <div id="gameOver">
        <h1>GAME OVER</h1>

        <div id="message">
            Ախխխ Տարոն, տունը լավ էիր խաղում 😭
        </div>

        <div id="finalScore"></div>

        <button onclick="restartGame()">
            Նորից խաղալ
        </button>
    </div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gameOverScreen = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");

function resizeCanvas(){
    canvas.width = Math.min(window.innerWidth - 20, 420);
    canvas.height = Math.min(window.innerHeight - 20, 700);
}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

let player;
let blocks;
let score;
let gameSpeed;
let running;

const keys = {};

document.addEventListener("keydown",(e)=>{
    keys[e.key] = true;
});

document.addEventListener("keyup",(e)=>{
    keys[e.key] = false;
});

function init(){

    player = {
        width:60,
        height:25,
        x:canvas.width/2-30,
        y:canvas.height-50,
        speed:8
    };

    blocks = [];

    score = 0;

    gameSpeed = 3;

    running = true;

    gameOverScreen.style.display = "none";

    requestAnimationFrame(gameLoop);
}

function spawnBlock(){

    blocks.push({
        x:Math.random()*(canvas.width-40),
        y:-40,
        width:40,
        height:40
    });

}

function update(){

    if(keys["ArrowLeft"] || keys["a"] || keys["A"]){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"] || keys["d"] || keys["D"]){
        player.x += player.speed;
    }

    if(player.x < 0) player.x = 0;

    if(player.x + player.width > canvas.width){
        player.x = canvas.width - player.width;
    }

    for(let i = blocks.length-1; i >= 0; i--){

        let b = blocks[i];

        b.y += gameSpeed;

        if(
            player.x < b.x + b.width &&
            player.x + player.width > b.x &&
            player.y < b.y + b.height &&
            player.y + player.height > b.y
        ){
            gameOver();
        }

        if(b.y > canvas.height){

            blocks.splice(i,1);

            score++;
        }
    }

    if(Math.random() < 0.03){
        spawnBlock();
    }

    gameSpeed = 3 + score * 0.05;
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ff88";

    ctx.fillRect(
        player.x,
        player.y,
        player.width,
        player.height
    );

    ctx.fillStyle = "#ff4444";

    blocks.forEach((b)=>{

        ctx.fillRect(
            b.x,
            b.y,
            b.width,
            b.height
        );

    });

    ctx.fillStyle = "white";
    ctx.font = "24px Arial";

    ctx.fillText(
        "Score: " + score,
        15,
        35
    );
}

function gameLoop(){

    if(!running) return;

    update();
    draw();

    requestAnimationFrame(gameLoop);
}

function gameOver(){

    running = false;

    finalScore.innerHTML =
        "<h2>Score: " + score + "</h2>";

    gameOverScreen.style.display = "flex";
}

function restartGame(){
    init();
}

/* MOBILE TOUCH CONTROL */

canvas.addEventListener("touchmove",(e)=>{

    e.preventDefault();

    const rect = canvas.getBoundingClientRect();

    const touchX =
        e.touches[0].clientX - rect.left;

    player.x =
        touchX - player.width/2;

    if(player.x < 0){
        player.x = 0;
    }

    if(player.x + player.width > canvas.width){
        player.x =
        canvas.width - player.width;
    }

},{passive:false});

init();

</script>

</body>
</html>
